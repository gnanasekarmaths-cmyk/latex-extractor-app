services:
  - type: web
    name: latex-extractor-backend
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    disk:
      name: latex-extractor-data
      mountPath: /data
      sizeGB: 5
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: MODEL_DEVICE
        value: cpu
      - key: OCR_TIMEOUT_SECONDS
        value: 120
      - key: UPLOAD_MAX_SIZE_MB
        value: 20
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: TEMP_DIR
        value: /data/tmp
      - key: CORS_ORIGINS
        sync: false
